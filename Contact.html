<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Zikra Seid</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <nav>
          <ul class="nav-list">
            <li><a href="./Home.html" class="nav-link">Home</a></li>
            <li><a href="./Projects.html" class="nav-link">Projects</a></li>
            <li><a href="./Contact.html" class="nav-link">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <h1>Get In Touch</h1>

      <p>
        <strong>Email:</strong>
        <a href="mailto:Zikraseid33@gmail.com">zikraseid33@gmail.com</a>
      </p>

      <form>
        <div class="form-group">
          <label for="name">Your Name:</label><br />
          <input type="text" id="name" name="name" placeholder="John" />
        </div>

        <div class="form-group">
          <label for="email">Your Email:</label><br />
          <input
            type="email"
            id="email"
            name="email"
            placeholder="John@gmail.com"
          />
        </div>

        <div class="form-group">
          <label for="message">Message:</label><br />
          <textarea
            id="message"
            name="message"
            rows="4"
            placeholder="I want to say..."
          ></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </main>

    <footer>
      <p>&copy; 2026 Zikra Seid. Built with pure semantic HTML + CSS.</p>
    </footer>
  </body>
</html>
